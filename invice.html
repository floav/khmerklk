<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធគណនាលេខវិក្កយបត្រ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kantumruy Pro', sans-serif;
            background-color: #f0f2f5;
        }
        .khmer-title {
            font-family: 'Kantumruy Pro', sans-serif;
            font-weight: 700;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
        <div class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-2xl md:text-3xl khmer-title">គណនាលេខវិក្កយបត្រ (បច្ចេកទេសបោះពុម្ព)</h1>
            <p class="mt-2 opacity-90">លេខធំនៅខាងលើ ដេញចុះមកតូចវិញ (ឧទាហរណ៍៖ ០៥១ - ០០១)</p>
        </div>

        <div class="p-6 space-y-6">
            <!-- Paper Size Selection -->
            <div>
                <label class="block text-gray-700 font-bold mb-3 text-lg">ជ្រើសរើសទំហំក្រដាស</label>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <button onclick="setSize(1, 'A4')" id="btn-A4" class="size-btn border-2 border-blue-600 bg-blue-50 text-blue-700 py-3 rounded-lg font-bold transition-all">A4 (1 ខាង)</button>
                    <button onclick="setSize(2, 'A5')" id="btn-A5" class="size-btn border-2 border-gray-200 py-3 rounded-lg font-bold hover:border-blue-400 transition-all">A5 (2 ខាង)</button>
                    <button onclick="setSize(4, 'A6')" id="btn-A6" class="size-btn border-2 border-gray-200 py-3 rounded-lg font-bold hover:border-blue-400 transition-all">A6 (4 ខាង)</button>
                    <button onclick="setSize(6, 'A7')" id="btn-A7" class="size-btn border-2 border-gray-200 py-3 rounded-lg font-bold hover:border-blue-400 transition-all">A7 (6 ខាង)</button>
                </div>
            </div>

            <div class="grid md:grid-cols-3 gap-6">
                <div>
                    <label class="block text-gray-700 font-bold mb-2">ចំនួនក្បាលសរុប (Books)</label>
                    <input type="number" id="bookCount" value="50" class="w-full border-2 border-gray-200 rounded-lg p-3 focus:border-blue-500 outline-none transition-all text-lg">
                </div>
                <div>
                    <label class="block text-gray-700 font-bold mb-2">១ក្បាលមានប៉ុន្មានសន្លឹក</label>
                    <input type="number" id="sheetsPerBook" value="50" class="w-full border-2 border-gray-200 rounded-lg p-3 focus:border-blue-500 outline-none transition-all text-lg">
                </div>
                <div>
                    <label class="block text-gray-700 font-bold mb-2">លេខចាប់ផ្តើម (៦ ខ្ទង់)</label>
                    <input type="text" id="startNumber" value="000001" maxlength="6" class="w-full border-2 border-gray-200 rounded-lg p-3 focus:border-blue-500 outline-none transition-all text-lg tracking-widest">
                </div>
            </div>

            <button onclick="calculateNumbers()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl text-xl shadow-lg transition-transform active:scale-95">
                គណនា និងបែងចែកតារាង
            </button>

            <!-- Results Section -->
            <div id="resultArea" class="hidden space-y-8 pt-6 border-t-2 border-gray-100">
                
                <!-- តារាងសង្ខេប៖ លេខក្បាលទី ១ (សម្រាប់គ្រប់ផ្នែក) -->
                <div class="bg-white border-2 border-red-500 rounded-xl overflow-hidden shadow-md max-w-2xl mx-auto">
                    <div class="bg-red-600 text-white p-3 text-center font-bold">
                        តារាងសង្ខេប៖ លេខក្បាលទី ១ (គ្រប់ផ្នែក)
                    </div>
                    <table class="w-full border-collapse">
                        <thead>
                            <tr class="bg-red-50 text-xs">
                                <th class="border p-3 text-red-700 w-1/2">ផ្នែក / Side</th>
                                <th class="border p-3 text-red-700 w-1/2">លេខក្បាលទី ១ (ធំបំផុត)</th>
                            </tr>
                        </thead>
                        <tbody id="summaryTableBody">
                            <!-- Data injected here -->
                        </tbody>
                    </table>
                </div>

                <div class="bg-blue-50 border-l-4 border-blue-400 p-4">
                    <p id="summaryText" class="text-blue-800 font-medium italic"></p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="tableContainer">
                    <!-- Detailed tables injected here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentSize = 1;
        let currentSizeName = 'A4';

        function setSize(size, name) {
            currentSize = size;
            currentSizeName = name;
            document.querySelectorAll('.size-btn').forEach(btn => {
                btn.classList.remove('border-blue-600', 'bg-blue-50', 'text-blue-700');
                btn.classList.add('border-gray-200');
            });
            document.getElementById('btn-' + name).classList.remove('border-gray-200');
            document.getElementById('btn-' + name).classList.add('border-blue-600', 'bg-blue-50', 'text-blue-700');
        }

        function formatNumber(num) {
            return num.toString().padStart(6, '0');
        }

        function calculateNumbers() {
            const totalBooks = parseInt(document.getElementById('bookCount').value);
            const sheetsPerBook = parseInt(document.getElementById('sheetsPerBook').value);
            let startNum = parseInt(document.getElementById('startNumber').value);
            
            if (isNaN(totalBooks) || isNaN(sheetsPerBook) || isNaN(startNum)) {
                alert("សូមបញ្ចូលព័ត៌មានឱ្យបានគ្រប់គ្រាន់");
                return;
            }

            // គណនាចំនួនក្បាលក្នុងមួយចំហៀង (ឧទាហរណ៍៖ ៥០ ក្បាល បើ A5 ចែកជា ២ គឺបាន ២៥ ក្បាលម្នាក់)
            const booksPerSide = Math.ceil(totalBooks / currentSize);
            // ចំនួនលេខសរុបក្នុងមួយចំហៀង
            const numbersPerSide = booksPerSide * sheetsPerBook;

            document.getElementById('summaryText').innerText = `លទ្ធផល៖ ${currentSizeName}, សរុប ${totalBooks} ក្បាល, ១ក្បាលមាន ${sheetsPerBook} សន្លឹក (ចែកបាន ${booksPerSide} ក្បាលក្នុងមួយចំហៀង)`;

            const summaryBody = document.getElementById('summaryTableBody');
            summaryBody.innerHTML = '';
            
            const container = document.getElementById('tableContainer');
            container.innerHTML = '';

            for (let s = 0; s < currentSize; s++) {
                // ក្បាលទី ១ នៃផ្នែកនីមួយៗ (លេខធំបំផុតក្នុងប្លុក)
                // រូបមន្ត៖ លេខចាប់ផ្តើម + (ផ្នែកនីមួយៗ * លេខសរុបក្នុងចំហៀង) + (ចំនួនលេខសរុបក្នុងចំហៀង - ១)
                // ឧទាហរណ៍៖ ចាប់ពី 1, 50 សន្លឹក, 25 ក្បាលម្នាក់ -> 1 + (0*1250) + (1250-50+49) = 1250? 
                // ក្បាលទី១ ត្រូវតែជាលេខធំបំផុតដែលត្រូវវៃលើក្រដាសសន្លឹកទី១
                let bookOneValue = startNum + (s * numbersPerSide) + (numbersPerSide - 1);
                
                // បន្ថែមចូលតារាងសង្ខេប
                const summaryRow = document.createElement('tr');
                summaryRow.innerHTML = `
                    <td class="border p-3 text-center font-bold text-gray-700">ផ្នែកទី ${s + 1}</td>
                    <td class="border p-3 text-center font-mono font-bold text-red-600 text-3xl tracking-widest">${formatNumber(bookOneValue)}</td>
                `;
                summaryBody.appendChild(summaryRow);

                // បង្កើតតារាងលម្អិត
                const tableWrapper = document.createElement('div');
                tableWrapper.className = "bg-white border-2 border-gray-100 rounded-xl overflow-hidden shadow-sm";
                
                const title = document.createElement('div');
                title.className = "bg-gray-800 text-white p-3 text-center font-bold";
                title.innerText = `តារាងផ្នែកទី ${s + 1}`;
                tableWrapper.appendChild(title);

                const table = document.createElement('table');
                table.className = "w-full border-collapse";
                
                let tableHtml = `
                    <thead>
                        <tr class="bg-gray-100 text-[10px]">
                            <th class="border p-2">ក្បាលទី</th>
                            <th class="border p-2">លេខវៃ (ធំមកតូច)</th>
                        </tr>
                    </thead>
                    <tbody>
                `;

                for (let i = 1; i <= booksPerSide; i++) {
                    // លេខក្បាលសរុប
                    let actualBookNum = (s * booksPerSide) + i;
                    if (actualBookNum > totalBooks) break;

                    // រូបមន្តដេញលេខពីធំមកតូចក្នុងក្បាលនីមួយៗ
                    // ឧទាហរណ៍ ក្បាលទី ១ ត្រូវចេញលេខធំបំផុតក្នុងប្លុកចំហៀងនោះ
                    let num = startNum + (s * numbersPerSide) + ((booksPerSide - i) * sheetsPerBook) + (sheetsPerBook - 1);
                    
                    tableHtml += `
                        <tr class="${i === 1 ? 'bg-red-50' : (i % 2 === 0 ? 'bg-gray-50' : '')}">
                            <td class="border p-2 text-center font-bold text-gray-500 text-xs italic">ក្បាល ${actualBookNum}</td>
                            <td class="border p-2 text-center font-mono font-bold ${i === 1 ? 'text-red-600 text-xl' : 'text-blue-600'}">${formatNumber(num)}</td>
                        </tr>
                    `;
                }

                tableHtml += `</tbody>`;
                table.innerHTML = tableHtml;
                tableWrapper.appendChild(table);
                container.appendChild(tableWrapper);
            }

            document.getElementById('resultArea').classList.remove('hidden');
        }
    </script>
</body>
</html>
